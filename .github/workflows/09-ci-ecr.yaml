# This is a manual-only teaching example.
# It shows how the same CI/CD story can extend to Amazon ECR.
# It is visible in the Actions tab, but it is not part of the core beginner labs.
# Do not run it unless the required AWS and registry secrets are configured.
name: CI-Push-To-ECR

on:
  # Keep this example visible without triggering it automatically during class.
  workflow_dispatch:

env:
  # These are example placeholders only.
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_NAME: tiny-health-app

jobs:
  verify:
    # CI still starts by checking whether the change is safe.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-and-push-image:
    # After CI passes, package the app and push the image to ECR.
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        # Use today's UTC date plus the GitHub run ID.
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        # In a real project, these values would come from GitHub secrets.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        # Exchange AWS credentials for a temporary ECR token.
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        # buildx is a common way to build and push images in one step.
        uses: docker/setup-buildx-action@v3

      - name: Build and push image with Docker Buildx
        # Two tags are pushed:
        # - one traceable run tag
        # - one latest tag for easy reference
        run: |
          docker buildx build \
            --push \
            --tag "${ECR_REGISTRY}/${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            --tag "${ECR_REGISTRY}/${IMAGE_NAME}:latest" \
            .
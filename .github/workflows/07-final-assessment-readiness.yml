# This workflow checks whether the final assessment setup is ready.
# It does not build or deploy the final solution.
# The assessment stays generic:
# - one container registry
# - one Linux host reachable over SSH
# - one app exposed on port 8000
name: 07 Final Assessment Readiness Workflow

on:
  workflow_dispatch:

env:
  IMAGE_NAME: tiny-health-app

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  check-registry-access:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check required GitHub secrets
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing_secret=0
          for required in REGISTRY_HOST REGISTRY_USERNAME REGISTRY_PASSWORD DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!required}" ]; then
              echo "Missing required GitHub secret: ${required}"
              missing_secret=1
            fi
          done

          if [ "${missing_secret}" -eq 1 ]; then
            exit 1
          fi

          echo "All required GitHub secrets are present."

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Show expected image repository
        run: 'echo "Expected assessment image repository: ${{ secrets.REGISTRY_HOST }}/${{ env.IMAGE_NAME }}"'

  check-vm-readiness:
    needs: check-registry-access
    runs-on: ubuntu-latest

    steps:
      - name: Check Ubuntu VM readiness over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            docker --version
            curl --version
            docker ps
            echo "VM readiness check passed."
